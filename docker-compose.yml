name: taxbridge-brasil

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taxbridge
      POSTGRES_PASSWORD: taxbridge
      POSTGRES_DB: taxbridge
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxbridge -d taxbridge"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    # api and worker share one image so the backend is built once, not twice
    # in parallel (avoids the build OOM that kills the web npm ci).
    image: taxbridge-brasil-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://taxbridge:taxbridge@db:5432/taxbridge
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      CORS_ORIGINS: http://localhost:3000
      ENV: development
      AUTO_CREATE_TABLES: "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 12

  worker:
    build: ./backend
    image: taxbridge-brasil-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://taxbridge:taxbridge@db:5432/taxbridge
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
    command: python -m app.workers.worker
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
